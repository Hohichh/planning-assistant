spring.application.name=planning-assistant
server.port=8080

# ===== PostgreSQL datasource =====
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:planning_assistant}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Liquibase =====
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# ===== Spring AI =====
spring.ai.openai.api-key=${OPEN_ROUTER_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.chat.options.model=deepseek/deepseek-v4-flash:free
# spring.ai.openai.chat.options.temperature=0.3

# ===== Planning AI runtime =====
planning.ai.timeout-ms=15000
planning.ai.max-attempts=3
planning.ai.retry-backoff-ms=500

# ===== Rate limiting =====
planning.ai.rate-limit.requests=10
planning.ai.rate-limit.window-seconds=60
